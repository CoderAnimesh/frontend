<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Quantum Quirks Event Gallery</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link href="https://cdnjs.cloudflare.com/ajax/libs/glightbox/3.2.0/css/glightbox.min.css" rel="stylesheet">
  
  <style>
    /* Custom Background & Fonts */
    body {
      background: radial-gradient(circle at top left, #0f172a, #1e293b);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      color: white;
    }

    /* Luxury Title Gradient */
    .lux-title {
      background: linear-gradient(to right, #34d399, #3b82f6, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px rgba(59, 130, 246, 0.3);
    }

    /* Card Hover Effects */
    .gallery-item {
      transition: all 0.4s ease-out;
      cursor: zoom-in;
    }
    .gallery-item:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 20px 40px -5px rgba(0,0,0,0.6);
      z-index: 10;
    }

    /* Description Box */
    .gallery-description {
      background: rgba(15, 23, 42, 0.95);
      padding: 1rem;
      border-top: 1px solid rgba(255,255,255,0.1);
      font-weight: 500;
      color: #e2e8f0;
      text-align: center;
      font-size: 0.95rem;
    }

    /* Fullscreen Loader */
    .fullscreen-loader {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.98);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      flex-direction: column;
    }
    .spinner {
      border: 4px solid rgba(255,255,255,0.1);
      border-top: 4px solid #34d399;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Custom Scrollbar for Event Buttons */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>

  <div id="fullscreenLoader" class="fullscreen-loader" style="display: none;">
    <div class="spinner"></div>
    <div class="text-gray-300 font-medium tracking-wider">LOADING GALLERY...</div>
  </div>

  <div class="max-w-7xl mx-auto px-4 py-8">
    
    <header class="text-center mb-12">
      <h1 class="text-5xl md:text-6xl font-extrabold lux-title mb-4">Event Gallery</h1>
      <p class="text-gray-400 text-lg">Relive the moments captured in time.</p>
    </header>

    <div class="flex justify-center mb-10">
      <div class="w-full max-w-5xl overflow-x-auto no-scrollbar pb-4">
        <div id="eventScroller" class="flex space-x-3 px-2 justify-start md:justify-center min-w-max">
          </div>
      </div>
    </div>

    <div id="galleryGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
      </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/glightbox/3.2.0/js/glightbox.min.js"></script>

  <script>
    (async function(){
      const galleryGrid = document.getElementById("galleryGrid");
      const fullscreenLoader = document.getElementById("fullscreenLoader");
      const eventScroller = document.getElementById("eventScroller");
      const API_BASE = "http://localhost:5000";

      // Loader Utils
      const showLoader = () => fullscreenLoader.style.display = "flex";
      const hideLoader = () => fullscreenLoader.style.display = "none";

      // ---------------------------------------------
      // 1. FETCH EVENTS
      // ---------------------------------------------
      try {
        showLoader();
        const evRes = await fetch(`${API_BASE}/api/events`);
        const evData = await evRes.json();
        hideLoader();

        if(evData.events && evData.events.length > 0){
          // Sort events: Newest first
          const sortedEvents = evData.events.sort((a,b) => new Date(b.start_date) - new Date(a.start_date));

          // Create Buttons
          sortedEvents.forEach((ev, index) => {
            const btn = document.createElement("button");
            btn.textContent = ev.name;
            
            // Base styles for buttons
            const baseClass = "px-6 py-2.5 rounded-full border transition-all duration-300 whitespace-nowrap font-semibold text-sm tracking-wide shadow-md hover:shadow-lg hover:-translate-y-0.5";
            const activeClass = "bg-gradient-to-r from-emerald-500 to-teal-600 border-transparent text-white ring-2 ring-emerald-500/30";
            const inactiveClass = "bg-slate-800 border-slate-700 text-slate-400 hover:bg-slate-700 hover:text-white";

            btn.className = `${baseClass} ${index === 0 ? activeClass : inactiveClass}`;
            
            btn.addEventListener("click", () => {
              // Reset all buttons to inactive
              const allBtns = eventScroller.querySelectorAll("button");
              allBtns.forEach(b => b.className = `${baseClass} ${inactiveClass}`);
              
              // Set clicked button to active
              btn.className = `${baseClass} ${activeClass}`;
              
              loadGallery(ev.id);
            });
            eventScroller.appendChild(btn);
          });

          // Auto-load the first event
          loadGallery(sortedEvents[0].id);

        } else {
          galleryGrid.innerHTML = `
            <div class="col-span-full text-center py-20">
              <p class="text-gray-500 text-xl">No events available at the moment.</p>
            </div>`;
        }
      } catch(err) {
        console.error("Event Fetch Error:", err);
        hideLoader();
        galleryGrid.innerHTML = `
          <div class="col-span-full text-center py-20">
            <p class="text-red-400">Failed to connect to the server.</p>
          </div>`;
      }

      // ---------------------------------------------
      // 2. FETCH GALLERY IMAGES
      // ---------------------------------------------
      async function loadGallery(eventId){
        if(!eventId) return;
        
        // Clear grid and show loader
        galleryGrid.innerHTML = "";
        showLoader();

        try {
          const res = await fetch(`${API_BASE}/api/gallery/${eventId}`);
          const data = await res.json();
          hideLoader();

          if(!data.ok || !data.images){
            galleryGrid.innerHTML = `<p class="col-span-full text-center text-red-400">Failed to load images.</p>`;
            return;
          }

          // 🔥 FILTER: Keep ONLY Google Drive Links (http...)
          const newImages = data.images.filter(img => img.image_path.startsWith("http"));

          if(newImages.length === 0){
            galleryGrid.innerHTML = `
              <div class="col-span-full text-center py-20 flex flex-col items-center">
                <svg class="w-16 h-16 text-gray-600 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                <p class="text-gray-500 text-lg">No new images uploaded yet.</p>
              </div>`;
            return;
          }

          // Render Images
          newImages.forEach(img => {
            const card = document.createElement("div");
            card.className = "gallery-item bg-slate-800 rounded-2xl overflow-hidden shadow-xl border border-slate-700/50 group";
            
            const description = img.description || "Quantum Quirks Event";

            // --- THE FIX: Construct a Permanent Google Drive URL ---
            // If we have a drive_file_id, we use the permanent lh3 link.
            // If not, we fall back to the image_path in the DB.
            let permanentUrl = img.image_path;
            if (img.drive_file_id) {
                permanentUrl = `https://lh3.googleusercontent.com/d/${img.drive_file_id}`;
            }

            card.innerHTML = `
              <div class="relative overflow-hidden aspect-[4/3]">
                <a href="${permanentUrl}" class="glightbox" data-type="image" data-title="${description}" data-description="Quantum Quirks Gallery">
                  <img 
                    src="${permanentUrl}" 
                    alt="${description}" 
                    class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
                    loading="lazy"
                    onerror="this.onerror=null; this.src='https://placehold.co/600x400?text=Image+Unavailable';" 
                  />
                  <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                </a>
              </div>
              <div class="gallery-description">
                ${description}
              </div>
            `;
            galleryGrid.appendChild(card);
          });

          // Initialize Lightbox
          GLightbox({
            selector: '.glightbox',
            touchNavigation: true,
            loop: true,
            zoomable: true,
            openEffect: 'zoom',
            closeEffect: 'zoom'
          });

        } catch(err) {
          console.error("Gallery Fetch Error:", err);
          hideLoader();
          galleryGrid.innerHTML = `<p class="col-span-full text-center text-red-400">Error loading gallery data.</p>`;
        }
      }

    })();
  </script>
</body>
</html>
