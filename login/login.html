<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Quantam Quirks — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/gsap@3.12.5/dist/gsap.min.js"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 to-indigo-900 text-white antialiased">
  <!-- Loader Overlay -->
  <div id="loader" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="w-16 h-16 border-4 border-indigo-400 border-t-transparent rounded-full animate-spin"></div>
  </div>

  <div class="min-h-screen flex items-center justify-center p-6">
    <div class="relative w-full max-w-4xl grid grid-cols-1 md:grid-cols-2 gap-8">
      <!-- left hero -->
      <div class="p-8 rounded-3xl bg-white/5 backdrop-blur-lg border border-white/10 overflow-hidden">
        <div id="hero" class="w-full h-64 rounded-xl bg-gradient-to-tr from-indigo-600 to-violet-600 shadow-xl">
          <img style="width: 390px;height: 275px;border-radius: 5px;" src="../static/login.jpg" alt="">
        </div>
        <h2 class="mt-6 text-3xl font-extrabold gap-10">Welcome to <span class="text-indigo-300">Quantum Quirks</span></h2>
        <p class="mt-2 text-slate-300 ">Login as Organizer (8 chars) or Volunteer (6 chars)</p>
      </div>

      <!-- right form -->
      <div class="p-8 rounded-3xl bg-white/5 backdrop-blur-lg border border-white/10">
        <form id="loginForm" class="space-y-4">
          <label class="block text-sm text-slate-300">Username / Volunteer ID</label>
          <input id="username" class="w-full p-3 rounded-md bg-white/6 border border-white/8 outline-none text-black" placeholder="8-char organizer or 6-char volunteer" />
          <label class="block text-sm text-slate-300">Password</label>
          <input id="password" type="password" class="w-full p-3 rounded-md bg-white/6 border border-white/8 outline-none text-black" placeholder="Password" />
          <div class="flex items-center justify-between">
            <div class="text-sm text-slate-400">Role: <span id="roleText" class="font-semibold">—</span></div>
            <button type="submit" class="px-5 py-2 bg-indigo-500 rounded-md">Login</button>
          </div>
          <div id="msg" class="text-sm text-rose-300"></div>
        </form>
      </div>
    </div>
  </div>

  <script>
    // small animation
    gsap.to("#hero", { y: -10, duration: 3, repeat: -1, yoyo: true, ease: "sine.inOut" });
    gsap.to("body", { backgroundPosition: "0% 100%", duration: 8, repeat: -1, yoyo: true });

    const usernameEl = document.getElementById("username");
    const passwordEl = document.getElementById("password");
    const roleText = document.getElementById("roleText");
    const msg = document.getElementById("msg");
    const loader = document.getElementById("loader");

    function showLoader() { loader.classList.remove("hidden"); }
    function hideLoader() { loader.classList.add("hidden"); }

    function roleFromUsername(name) {
      if (!name) return "—";
      if (name.length === 8) return "Organizer";
      if (name.length === 6) return "Volunteer";
      return "Unknown";
    }

    usernameEl.addEventListener("input", () => {
      roleText.textContent = roleFromUsername(usernameEl.value.trim());
      msg.textContent = "";
    });

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.textContent = "";
      const username = usernameEl.value.trim();
      const password = passwordEl.value;
      const role = roleFromUsername(username);

      if (role === "Unknown" || role === "—") { 
        msg.textContent = "Username length must be 8 (organizer) or 6 (volunteer)"; 
        return; 
      }

      try {
        showLoader(); // show loader when login starts

        const endpoint = role === "Organizer" ? "/api/organizer/login" : "/api/volunteer/login";
        const body = role === "Organizer" ? { username, password } : { volId: username, password };
        const res = await fetch("https://backend-hdnh.onrender.com" + endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        hideLoader(); // hide loader when response comes

        if (!res.ok || !data.ok) {
          msg.textContent = data.message || "Login failed";
          return;
        }
        // store token & redirect
        localStorage.setItem("techathon_token", data.token);
        if (role === "Organizer") window.location.href = "dashboard/orgDashboard.html";
        else window.location.href = "dashboard/voltDashboard.html";
      } catch (err) {
        hideLoader();
        console.error(err);
        msg.textContent = "Server/network error";
      }
    });
  </script>
</body>
</html>
