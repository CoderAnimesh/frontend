<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Organizer - Contact Messages</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    #loaderOverlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
      display: none;
    }
    .spinner {
      border: 6px solid #f3f3f3;
      border-top: 6px solid #6366f1;
      border-radius: 50%;
      width: 50px; height: 50px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-slate-900 text-white min-h-screen p-6">

  <!-- Loader -->
  <div id="loaderOverlay"><div class="spinner"></div></div>

  <div class="max-w-6xl mx-auto">
    <header class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold">Contact Form Submissions</h1>
      <button id="backBtn" class="px-3 py-2 bg-indigo-500 rounded">⬅ Back</button>
    </header>

    <div id="contactContainer" class="space-y-4"></div>
  </div>

  <script>
    (async function(){
      const token = localStorage.getItem("techathon_token");
      if(!token){ location.href="../login.html"; return; }
    
      const headers = { Authorization:"Bearer " + token };
      const loader = document.getElementById("loaderOverlay");
      const showLoader = ()=> loader.style.display="flex";
      const hideLoader = ()=> loader.style.display="none";
    
      document.getElementById("backBtn").addEventListener("click", ()=> history.back());
    
      // Delete function
      async function deleteContact(id){
        if(!confirm("Are you sure you want to delete this message?")) return;
        showLoader();
        try {
          const res = await fetch(`https://backend-5mar.onrender.com/contacts/${id}`, {
            method: "DELETE",
            headers
          });
          const data = await res.json();
          if(!res.ok || !data.ok) alert(data.message || "Failed to delete");
          else loadContacts(); // reload after delete
        } catch(err){ alert("Error deleting contact"); }
        finally{ hideLoader(); }
      }
    
      // Fetch contacts
      async function loadContacts(){
        showLoader();
        try {
          const res = await fetch("https://backend-5mar.onrender.com/contacts", { headers });
          const data = await res.json();
          const container = document.getElementById("contactContainer");
          container.innerHTML="";
          if(!res.ok || !data.ok){
            container.innerHTML="<p class='text-rose-400'>Failed to load contacts</p>";
            return;
          }
    
          if(data.contacts.length===0){
            container.innerHTML="<p class='text-slate-300'>No messages found.</p>";
            return;
          }
    
          data.contacts.forEach(c=>{
            const div=document.createElement("div");
            div.className="p-4 bg-white/5 rounded flex justify-between items-start";
            div.innerHTML=`
              <div>
                <div class="font-semibold">${c.name} (${c.email}, ${c.phone||"N/A"})</div>
                <div class="text-sm text-slate-300 mt-1">${c.message}</div>
                <div class="text-xs text-slate-400 mt-2">Submitted: ${new Date(c.created_at).toLocaleString()}</div>
              </div>
              <button class="ml-4 px-3 py-1 bg-rose-500 hover:bg-rose-600 rounded text-sm">Delete</button>
            `;
            div.querySelector("button").addEventListener("click", ()=> deleteContact(c.id));
            container.appendChild(div);
          });
        } catch(err){
          console.error(err);
          alert("Error loading contacts");
        }
        finally{ hideLoader(); }
      }
    
      loadContacts();
    })();
    </script>
    
</body>
</html>
