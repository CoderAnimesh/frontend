<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Organizer Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    #loaderOverlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center;
      z-index: 2000; display: none; flex-direction: column;
    }
    .spinner {
      border: 6px solid #f3f3f3; border-top: 6px solid #6366f1; border-radius: 50%; width: 50px; height: 50px;
      animation: spin 1s linear infinite; mb-4;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .modal-backdrop { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(4px); }
    
    /* Custom Checkbox Style for Languages */
    .lang-checkbox:checked + div {
        background-color: #4f46e5; /* Indigo-600 */
        border-color: #4f46e5;
        color: white;
    }
  </style>
</head>
<body class="min-h-screen bg-slate-900 text-white p-6 font-sans">
  
  <div id="loaderOverlay">
    <div class="spinner"></div>
    <div class="text-white mt-4 font-semibold">Processing...</div>
  </div>

  <div class="max-w-7xl mx-auto">
    
    <header class="flex flex-col md:flex-row items-center justify-between mb-8 bg-slate-800 p-4 rounded-xl shadow-lg border border-slate-700">
      <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
        <i class="fa-solid fa-shield-halved mr-2"></i> <span id="welcomeText">Dashboard</span>
      </h1>
      <div class="flex flex-wrap items-center gap-3 mt-4 md:mt-0">
        <button id="viewCandidatesBtn" class="px-4 py-2 bg-yellow-600 hover:bg-yellow-500 rounded-lg font-medium transition text-sm">
          <i class="fa-solid fa-users"></i> Candidates
        </button>
        <button id="viewContactBtn" class="px-4 py-2 bg-cyan-600 hover:bg-cyan-500 rounded-lg font-medium transition text-sm">
          <i class="fa-solid fa-envelope"></i> Contacts
        </button>
        <button id="openGallery" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-lg font-medium transition text-sm">
          <i class="fa-solid fa-images"></i> Gallery
        </button>
        <button id="logout" class="px-4 py-2 bg-rose-600 hover:bg-rose-500 rounded-lg font-medium transition text-sm">
          <i class="fa-solid fa-right-from-bracket"></i> Logout
        </button>
      </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      
      <div class="lg:col-span-2 space-y-8">
        
        <section class="p-6 bg-slate-800/50 rounded-xl border border-slate-700 shadow-xl">
          <h3 class="text-xl font-semibold mb-4 text-blue-400"><i class="fa-solid fa-calendar-check mr-2"></i> Manage Events</h3>
          <div class="flex flex-col md:flex-row gap-3 mb-4">
            <select id="eventsSelect" class="flex-1 p-3 bg-slate-900 border border-slate-600 rounded-lg text-white outline-none focus:border-blue-500"></select>
            <div class="flex gap-2">
                <button id="refreshEvents" title="Refresh List" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg"><i class="fa-solid fa-rotate"></i></button>
                <button id="openEditModalBtn" title="Edit Selected Event" class="px-4 py-2 bg-amber-600 hover:bg-amber-500 rounded-lg text-white font-bold border border-amber-500 shadow-md">
                    <i class="fa-solid fa-pen-to-square"></i> Edit
                </button>
                <button id="deleteEventBtn" title="Delete Event" class="px-4 py-2 bg-rose-600 hover:bg-rose-500 rounded-lg"><i class="fa-solid fa-trash"></i></button>
            </div>
          </div>
          
          <button id="loadParticipants" class="w-full py-3 bg-indigo-600 hover:bg-indigo-500 rounded-lg font-bold shadow-lg mb-4 transition">
            <i class="fa-solid fa-list-ul mr-2"></i> Load Participants
          </button>
          
          <div id="participantsContainerWrapper" class="overflow-y-auto border border-slate-600 rounded-lg bg-slate-900/50" style="max-height: 500px; min-height: 200px;">
            <div id="participantsContainer" class="p-2 space-y-2">
              <div class="text-center text-gray-500 py-10">Select an event and click Load Participants</div>
            </div>
          </div>
        </section>

        <section id="staffDirectorySection" class="hidden p-6 bg-slate-800/50 rounded-xl border border-indigo-500/30 shadow-xl">
          <h3 class="text-xl font-semibold mb-4 text-indigo-400">
              <i class="fa-solid fa-users-gear mr-2"></i> Staff Directory
          </h3>
          <div id="staffList" class="space-y-3">
              <div class="text-center py-4 opacity-50 italic">Retrieving secure records...</div>
          </div>
        </section>

        <section class="p-6 bg-slate-800/50 rounded-xl border border-yellow-600/30 shadow-xl">
          <h3 class="text-xl font-semibold mb-4 text-yellow-400"><i class="fa-solid fa-receipt mr-2"></i> Quick Verify Payment</h3>
          <div class="flex gap-3 items-end">
            <div class="flex-1">
              <label class="text-xs text-gray-400 ml-1">Participant ID</label>
              <input id="payPartId" type="number" placeholder="Enter ID..." class="w-full p-3 rounded-lg bg-slate-900 border border-slate-600 text-white outline-none focus:border-yellow-500" />
            </div>
            <button id="verifyPaymentBtn" class="px-6 py-3 bg-green-600 hover:bg-green-500 rounded-lg font-bold transition shadow-lg">
              Verify & Send Ticket 🎟️
            </button>
          </div>
        </section>
      </div>

      <div class="space-y-8">
        
        <section class="p-6 bg-slate-800/50 rounded-xl border border-slate-700 shadow-xl">
          <h3 class="text-xl font-semibold mb-4 text-purple-400"><i class="fa-solid fa-plus mr-2"></i> Create Event</h3>
          <div class="space-y-3">
            <input id="evName" placeholder="Event Name" class="w-full p-3 rounded-lg bg-slate-900 border border-slate-600 outline-none"/>
            
            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="text-xs text-gray-400 ml-1">End Date</label>
                    <input id="evEnd" type="date" class="w-full p-3 rounded-lg bg-slate-900 border border-slate-600 outline-none text-gray-400"/>
                </div>
                <div>
                    <label class="text-xs text-gray-400 ml-1">End Time</label>
                    <input id="evTime" type="time" class="w-full p-3 rounded-lg bg-slate-900 border border-slate-600 outline-none text-gray-400"/>
                </div>
            </div>

            <div class="bg-slate-900 p-3 rounded-lg border border-slate-600">
                <label class="text-xs text-gray-400 block mb-2">Participation Type</label>
                <div class="flex gap-4 mb-2">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="radio" name="partType" value="Solo" checked onchange="toggleGroupInput('create', this.value)" class="accent-purple-500 w-4 h-4"> Solo
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="radio" name="partType" value="Group" onchange="toggleGroupInput('create', this.value)" class="accent-purple-500 w-4 h-4"> Group
                    </label>
                </div>
                <div id="createGroupSizeDiv" class="hidden mt-2">
                    <label class="text-xs text-slate-500">Maximum Group Members:</label>
                    <input id="evGroupSize" type="number" min="2" max="10" placeholder="e.g. 4" class="w-full p-2 rounded bg-slate-800 border border-slate-600 text-sm text-white"/>
                </div>
            </div>

            <div class="bg-slate-900 p-3 rounded-lg border border-slate-600">
                <label class="text-xs text-gray-400 block mb-2">Allowed Languages (Select up to 8)</label>
                <div class="grid grid-cols-3 gap-2" id="createLangContainer">
                    </div>
            </div>

            <input id="evAmount" type="number" placeholder="Entry Fee (₹)" class="w-full p-3 rounded-lg bg-slate-900 border border-slate-600 outline-none"/>
            <textarea id="evDesc" rows="2" placeholder="Short Description" class="w-full p-3 rounded-lg bg-slate-900 border border-slate-600 outline-none"></textarea>
            <button id="createEventBtn" class="w-full py-3 bg-purple-600 hover:bg-purple-500 rounded-lg font-bold transition">Create Event</button>
          </div>
        </section>

        <section id="restricted_addVolunteer" class="p-6 bg-slate-800/50 rounded-xl border border-slate-700 shadow-xl hidden">
          <h3 class="text-xl font-semibold mb-4 text-orange-400"><i class="fa-solid fa-user-plus mr-2"></i> Add Volunteer</h3>
          <div class="space-y-3">
            <input id="vName" placeholder="Full Name" class="w-full p-2 rounded bg-slate-900 border border-slate-600 outline-none"/>
            <div class="grid grid-cols-2 gap-2">
              <input id="vEmail" placeholder="Email" class="p-2 rounded bg-slate-900 border border-slate-600 outline-none"/>
              <input id="vPhone" placeholder="Phone" class="p-2 rounded bg-slate-900 border border-slate-600 outline-none"/>
            </div>
            <div class="grid grid-cols-2 gap-2">
              <input id="vUsername" placeholder="User ID (6 char)" class="p-2 rounded bg-slate-900 border border-slate-600 outline-none"/>
              <input id="vPassword" type="password" placeholder="Password" class="p-2 rounded bg-slate-900 border border-slate-600 outline-none"/>
            </div>
            <button id="addVolunteer" class="w-full py-2 bg-orange-600 hover:bg-orange-500 rounded-lg font-bold">Add Volunteer</button>
            <div id="volMsg" class="text-sm text-center text-green-400"></div>
          </div>
        </section>

        <section id="restricted_addOrganizer" class="hidden p-6 bg-slate-800/50 rounded-xl border border-slate-700 shadow-xl">
          <h3 class="text-xl font-semibold mb-4 text-pink-400"><i class="fa-solid fa-user-shield mr-2"></i> Add Organizer</h3>
          <div class="space-y-3">
            <input id="oName" placeholder="Full Name" class="w-full p-2 rounded bg-slate-900 border border-slate-600 outline-none"/>
            <div class="grid grid-cols-2 gap-2">
              <input id="oEmail" placeholder="Email" class="p-2 rounded bg-slate-900 border border-slate-600 outline-none"/>
              <input id="oPhone" placeholder="Phone" class="p-2 rounded bg-slate-900 border border-slate-600 outline-none"/>
            </div>
            <div class="grid grid-cols-2 gap-2">
              <input id="oUsername" placeholder="User ID (8 char)" class="p-2 rounded bg-slate-900 border border-slate-600 outline-none"/>
              <input id="oPassword" type="password" placeholder="Password" class="p-2 rounded bg-slate-900 border border-slate-600 outline-none"/>
            </div>
            <button id="addOrganizer" class="w-full py-2 bg-pink-600 hover:bg-pink-500 rounded-lg font-bold">Add Organizer</button>
            <div id="orgMsg" class="text-sm text-center text-green-400"></div>
          </div>
        </section>

        <section id="restricted_manualEntry" class="p-6 bg-slate-800/50 rounded-xl border border-slate-700 shadow-xl hidden">
            <h3 class="text-xl font-semibold mb-4 text-green-400"><i class="fa-solid fa-user-plus mr-2"></i> Manual Participant</h3>
            <div class="grid grid-cols-1 gap-2">
              <input id="pName" placeholder="Name" class="p-2 rounded bg-slate-900 border border-slate-600 outline-none" />
              <input id="pEmail" placeholder="Email" class="p-2 rounded bg-slate-900 border border-slate-600 outline-none" />
              <select id="pEvent" class="p-2 rounded bg-slate-900 border border-slate-600 outline-none text-gray-300"></select>
              <input id="pPhone" placeholder="Phone" class="p-2 rounded bg-slate-900 border border-slate-600 outline-none" />
              <input id="pLang" placeholder="Language (Java/C++)" class="p-2 rounded bg-slate-900 border border-slate-600 outline-none" />
            </div>
            <button id="addParticipant" class="mt-4 w-full py-2 bg-green-600 hover:bg-green-500 rounded-lg font-bold">Add Participant</button>
            <div id="addMsg" class="mt-2 text-green-400 text-center"></div>
        </section>
      </div>
    </div>

  </div>

  <div id="editEventModal" class="fixed inset-0 modal-backdrop z-50 hidden flex justify-center items-center p-4">
    <div class="bg-slate-800 w-full max-w-lg rounded-2xl shadow-2xl flex flex-col border border-slate-600 max-h-[90vh] overflow-y-auto">
      <div class="p-6 border-b border-slate-700 flex justify-between items-center bg-slate-900/50 rounded-t-2xl sticky top-0 z-10 backdrop-blur-md">
        <h2 class="text-2xl font-bold text-amber-400"><i class="fa-solid fa-pen-to-square mr-2"></i> Edit Event</h2>
        <button id="closeEditModalBtn" class="text-gray-400 hover:text-white text-2xl transition"><i class="fa-solid fa-times"></i></button>
      </div>
      <div class="p-6 space-y-4">
        <input type="hidden" id="editEvId">
        <input id="editEvName" placeholder="Event Name" class="w-full p-3 rounded-lg bg-slate-900 border border-slate-600 outline-none focus:border-amber-500 text-white"/>
        
        <div class="grid grid-cols-2 gap-3">
          <input id="editEvEnd" type="date" class="w-full p-3 rounded-lg bg-slate-900 border border-slate-600 outline-none text-gray-300"/>
          <input id="editEvTime" type="time" class="w-full p-3 rounded-lg bg-slate-900 border border-slate-600 outline-none text-gray-300"/>
        </div>

        <div class="bg-slate-900 p-3 rounded-lg border border-slate-600">
            <label class="text-xs text-gray-400 block mb-2">Participation Type</label>
            <div class="flex gap-4 mb-2">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="radio" name="editPartType" value="Solo" onchange="toggleGroupInput('edit', this.value)" class="accent-purple-500 w-4 h-4"> Solo
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="radio" name="editPartType" value="Group" onchange="toggleGroupInput('edit', this.value)" class="accent-purple-500 w-4 h-4"> Group
                </label>
            </div>
            <div id="editGroupSizeDiv" class="hidden mt-2">
                <label class="text-xs text-slate-500">Maximum Group Members:</label>
                <input id="editEvGroupSize" type="number" min="2" max="10" placeholder="e.g. 4" class="w-full p-2 rounded bg-slate-800 border border-slate-600 text-sm text-white"/>
            </div>
        </div>

        <div class="bg-slate-900 p-3 rounded-lg border border-slate-600">
            <label class="text-xs text-gray-400 block mb-2">Allowed Languages (Max 8)</label>
            <div class="grid grid-cols-3 gap-2" id="editLangContainer">
                </div>
        </div>

        <input id="editEvAmount" type="number" placeholder="Fee" class="w-full p-3 rounded-lg bg-slate-900 border border-slate-600 outline-none focus:border-amber-500 text-white"/>
        <textarea id="editEvDesc" rows="3" placeholder="Description" class="w-full p-3 rounded-lg bg-slate-900 border border-slate-600 outline-none focus:border-amber-500 text-white"></textarea>
      </div>
      <div class="p-6 pt-0 flex gap-3">
        <button id="saveEditEventBtn" class="flex-1 py-3 bg-amber-600 hover:bg-amber-500 rounded-lg font-bold text-white shadow-lg transition">Update Event</button>
        <button id="cancelEditModalBtn" class="px-6 py-3 bg-slate-700 hover:bg-slate-600 rounded-lg font-bold text-gray-300 transition">Cancel</button>
      </div>
    </div>
  </div>

  <div id="contactsModal" class="fixed inset-0 modal-backdrop z-50 hidden flex justify-center items-center p-4">
    <div class="bg-slate-800 w-full max-w-4xl max-h-[85vh] rounded-2xl shadow-2xl flex flex-col border border-slate-700">
      <div class="p-6 border-b border-slate-700 flex justify-between items-center">
        <h2 class="text-2xl font-bold text-cyan-400">Contact Messages</h2>
        <button onclick="closeContactsModal()" class="text-gray-400 hover:text-white text-2xl"><i class="fa-solid fa-times"></i></button>
      </div>
      <div class="p-6 flex-1 overflow-y-auto">
        <div id="contactsList" class="space-y-4"></div>
      </div>
    </div>
  </div>

  <script>
    (async function(){
      const token = localStorage.getItem("techathon_token");
      if(!token){ location.href="../login.html"; return; }
      
      const API_BASE = "https://backend-ab1p.onrender.com"; 
      const headers = { "Content-Type":"application/json", Authorization: "Bearer " + token };
      const loader = document.getElementById("loaderOverlay");
      const showLoader = ()=>loader.style.display="flex";
      const hideLoader = ()=>loader.style.display="none";

      const availableLangs = ["C", "C++", "Java", "Python", "JavaScript", "HTML/CSS", "Kotlin", "Swift", "PHP", "Go", "Rust", "Ruby"];
      let allEvents = []; 

      // --- 1. LANGUAGE GRID GENERATOR ---
      function setupLangGrid(containerId, namePrefix) {
        const container = document.getElementById(containerId);
        container.innerHTML = "";
        availableLangs.forEach(lang => {
            const div = document.createElement("label");
            div.className = "cursor-pointer select-none text-xs";
            div.innerHTML = `
                <input type="checkbox" name="${namePrefix}Lang" value="${lang}" class="hidden lang-checkbox" onchange="limitChecks('${namePrefix}')">
                <div class="border border-slate-600 rounded py-2 text-center text-slate-400 hover:border-indigo-500 transition duration-200">${lang}</div>
            `;
            container.appendChild(div);
        });
      }
      setupLangGrid("createLangContainer", "create");
      setupLangGrid("editLangContainer", "edit");

      // --- 2. UI UTILS (Toggle & Limit) ---
      window.limitChecks = (prefix) => {
          const checks = document.querySelectorAll(`input[name="${prefix}Lang"]:checked`);
          if(checks.length > 8) {
              alert("Maximum 8 languages allowed.");
              event.target.checked = false; // Uncheck the last one
          }
      };

      window.toggleGroupInput = (prefix, val) => {
          const div = document.getElementById(`${prefix}GroupSizeDiv`);
          if(val === "Group") div.classList.remove("hidden");
          else div.classList.add("hidden");
      };

      function parseJwt (token) {
        try {
          var base64Url = token.split('.')[1];
          var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
          var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
              return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
          }).join(''));
          return JSON.parse(jsonPayload);
        } catch (e) { return {}; }
      }

      const decoded = parseJwt(token);
      const currentUsername = decoded.username || "User";
      document.getElementById("welcomeText").textContent = `Dashboard (${currentUsername})`;

      // --- Identity & Privilege Lock ---
      if(currentUsername === "Animesh1") {
          document.getElementById("restricted_addVolunteer").classList.remove("hidden");
          document.getElementById("restricted_addOrganizer").classList.remove("hidden");
          document.getElementById("restricted_manualEntry").classList.remove("hidden");
          document.getElementById("staffDirectorySection").classList.remove("hidden");
          loadStaffList(); 
      }

      async function callApi(url, options){ 
        showLoader(); 
        try { 
          const res = await fetch(url, options); 
          const data = await res.json(); 
          return { res, data }; 
        } catch(e){ console.error(e); return {}; } 
        finally{ hideLoader(); } 
      }

      // --- Events Logic ---
      async function fetchEvents(){
        const {res, data} = await callApi(`${API_BASE}/api/events`, { headers });
        if(!data || !data.ok) return; 
        allEvents = data.events; 
        
        const sel = document.getElementById("eventsSelect"); 
        sel.innerHTML="";
        const sel2 = document.getElementById("pEvent"); 
        sel2.innerHTML="";
        
        data.events.forEach(ev=>{
          const opt = document.createElement("option");
          opt.value = ev.id; 
          opt.textContent = ev.name;
          sel.appendChild(opt);
          if(sel2) sel2.appendChild(opt.cloneNode(true));
        });
      }
      await fetchEvents();

      // --- EDIT MODAL HANDLERS ---
      const editModal = document.getElementById("editEventModal");
      
      const closeEdit = () => editModal.classList.add("hidden");
      document.getElementById("closeEditModalBtn").onclick = closeEdit;
      document.getElementById("cancelEditModalBtn").onclick = closeEdit;

      document.getElementById("openEditModalBtn").onclick = () => {
        const id = document.getElementById("eventsSelect").value;
        if (!id) return alert("Please select an event first.");

        const ev = allEvents.find(e => e.id == id);
        if(!ev) return alert("Event data not found.");

        // Fill Basic Data
        document.getElementById("editEvId").value = ev.id;
        document.getElementById("editEvName").value = ev.name;
        document.getElementById("editEvAmount").value = ev.entry_amount;
        document.getElementById("editEvDesc").value = ev.description;
        
        // Date Handling
        if(ev.end_date) {
            const d = new Date(ev.end_date);
            document.getElementById("editEvEnd").value = d.toISOString().split('T')[0];
            const hours = String(d.getHours()).padStart(2, '0');
            const minutes = String(d.getMinutes()).padStart(2, '0');
            document.getElementById("editEvTime").value = `${hours}:${minutes}`;
        }

        // --- PRE-FILL NEW FIELDS ---
        // 1. Participation Type
        const pType = ev.participation_type || "Solo";
        const radios = document.getElementsByName("editPartType");
        radios.forEach(r => { 
            r.checked = (r.value === pType); 
        });
        toggleGroupInput("edit", pType);
        
        // 2. Group Size
        document.getElementById("editEvGroupSize").value = ev.max_group_size || 1;

        // 3. Languages
        // Uncheck all first
        document.querySelectorAll('input[name="editLang"]').forEach(cb => cb.checked = false);
        // Check saved ones
        if (ev.allowed_languages) {
            const savedLangs = ev.allowed_languages.split(','); // "C,Java" -> ["C", "Java"]
            savedLangs.forEach(lang => {
                const cb = document.querySelector(`input[name="editLang"][value="${lang}"]`);
                if (cb) cb.checked = true;
            });
        }

        editModal.classList.remove("hidden");
      };

      document.getElementById("saveEditEventBtn").onclick = async () => {
        const id = document.getElementById("editEvId").value;
        const datePart = document.getElementById("editEvEnd").value;
        const timePart = document.getElementById("editEvTime").value;
        const fullDate = `${datePart}T${timePart}:00`;

        // Gather New Fields
        const selectedLangs = Array.from(document.querySelectorAll('input[name="editLang"]:checked')).map(cb => cb.value);
        const type = document.querySelector('input[name="editPartType"]:checked').value;
        const groupSize = type === "Group" ? document.getElementById("editEvGroupSize").value : 1;

        const body = { 
            name: document.getElementById("editEvName").value.trim(), 
            description: document.getElementById("editEvDesc").value.trim(), 
            endDate: fullDate, 
            amount: Number(document.getElementById("editEvAmount").value),
            languages: selectedLangs, // Send array
            type: type,
            groupSize: Number(groupSize)
        };

        const {data} = await callApi(`${API_BASE}/api/events/update/${id}`, { method: "PUT", headers, body: JSON.stringify(body) });
        if(data.ok) { 
            alert("✅ Event Updated Successfully"); 
            closeEdit(); 
            fetchEvents(); 
        } else {
            alert("❌ Update Failed: " + (data.message || "Unknown error"));
        }
      };

      // --- CREATE EVENT ---
      document.getElementById("createEventBtn").onclick = async () => {
        const datePart = document.getElementById("evEnd").value;
        const timePart = document.getElementById("evTime").value;
        if(!datePart || !timePart) return alert("Set Date & Time");

        // Gather New Fields
        const selectedLangs = Array.from(document.querySelectorAll('input[name="createLang"]:checked')).map(cb => cb.value);
        const type = document.querySelector('input[name="partType"]:checked').value;
        const groupSize = type === "Group" ? document.getElementById("evGroupSize").value : 1;

        const body = { 
            name: document.getElementById("evName").value.trim(), 
            description: document.getElementById("evDesc").value.trim(), 
            endDate: `${datePart}T${timePart}:00`, 
            amount: Number(document.getElementById("evAmount").value),
            languages: selectedLangs,
            type: type,
            groupSize: Number(groupSize)
        };

        const {data} = await callApi(`${API_BASE}/api/events`,{ method:"POST", headers, body: JSON.stringify(body) });
        if(data.ok) { alert("Created"); fetchEvents(); }
        else alert("Failed: " + data.message);
      };

      // --- Delete Event Logic ---
      document.getElementById("deleteEventBtn").onclick = async () => {
          const id = document.getElementById("eventsSelect").value;
          if(!id) return alert("Select an event");
          if(!confirm("⚠️ DELETE EVENT? This will delete all participants associated with it.")) return;
          
          const {data} = await callApi(`${API_BASE}/api/events/${id}`, { method: "DELETE", headers });
          if(data.ok) { alert("Deleted"); fetchEvents(); }
      };

      // --- Staff Logic ---
      async function loadStaffList() {
          const {data} = await callApi(`${API_BASE}/api/admin/staff`, { headers });
          const container = document.getElementById("staffList");
          container.innerHTML = "";
          if(data?.staff?.length) {
              data.staff.forEach(s => {
                  const div = document.createElement("div");
                  div.className = "p-4 bg-slate-950/50 border border-slate-800 rounded-xl flex items-center justify-between";
                  div.innerHTML = `<div><span class="font-bold text-orange-400">${s.name}</span> <span class="text-xs text-gray-500">${s.role}</span></div><button onclick="deleteStaff('${s.role}', ${s.id})" class="text-rose-500"><i class="fa-solid fa-trash"></i></button>`;
                  container.appendChild(div);
              });
          } else { container.innerHTML = '<div class="text-center text-gray-500">Empty</div>'; }
      }

      window.deleteStaff = async (role, id) => {
          if(!confirm("Delete?")) return;
          await callApi(`${API_BASE}/api/admin/staff/${role}/${id}`, { method: "DELETE", headers });
          loadStaffList();
      };

      // --- Participant Logic ---
      document.getElementById("loadParticipants").onclick = async () => {
        const eventId = document.getElementById("eventsSelect").value;
        const {data} = await callApi(`${API_BASE}/api/events/${eventId}/participants`,{ headers });
        const container = document.getElementById("participantsContainer"); 
        container.innerHTML="";
        if(!data.participants?.length) { container.innerHTML = '<div class="text-center py-6">Empty Registry</div>'; return; }
        
        data.participants.forEach(p => {
          const isPending = p.payment === 'pending_verification';
          const div = document.createElement("div");
          div.className = "p-4 bg-slate-800 rounded-lg border border-slate-700 flex justify-between items-center gap-4 mb-2";
          div.innerHTML = `
            <div class="flex-1">
              <p class="font-bold">${p.name}</p>
              <div class="text-xs text-gray-400">ID: ${p.id} | Status: ${p.payment}</div>
              ${p.transaction_id ? `<div class="text-xs font-mono text-indigo-400 bg-indigo-900/20 inline-block px-1 rounded mt-1">UTR: ${p.transaction_id}</div>` : ''}
            </div>
            <div class="flex gap-2">
              ${isPending ? `<button onclick="approveSinglePayment(${p.id})" class="px-3 py-1 bg-green-600 rounded text-xs font-bold">Approve</button>` : ''}
              <button data-id="${p.id}" class="delPartBtn text-rose-500 p-2"><i class="fa-solid fa-trash"></i></button>
            </div>`;
          container.appendChild(div);
        });

        document.querySelectorAll(".delPartBtn").forEach(btn => btn.onclick = async e => {
            const id = e.currentTarget.dataset.id;
            if(confirm("Delete?")) { await callApi(`${API_BASE}/api/participants/${id}`, { method: "DELETE", headers }); document.getElementById("loadParticipants").click(); }
        });
      };

      window.approveSinglePayment = async (id) => {
        if(!confirm(`Approve ID: ${id}?`)) return;
        const { data } = await callApi(`${API_BASE}/api/organizer/approve-payment`, { method: "POST", headers, body: JSON.stringify({ participantId: id }) });
        if(data.ok) { alert("Verified"); document.getElementById("loadParticipants").click(); }
      };

      document.getElementById("verifyPaymentBtn").onclick = async () => {
        const id = document.getElementById("payPartId").value;
        if(id) window.approveSinglePayment(id);
      };

      // --- Navigation ---
      document.getElementById("logout").onclick = () => { localStorage.removeItem("techathon_token"); location.href="../login.html"; };
      document.getElementById("openGallery").onclick = () => location.href="gallery.html";
      document.getElementById("viewCandidatesBtn").onclick = () => window.location.href = "candidates.html";
      document.getElementById("refreshEvents").onclick = fetchEvents;

      document.getElementById("addVolunteer").onclick = async () => {
          const body = { name: document.getElementById("vName").value, email: document.getElementById("vEmail").value, phone: document.getElementById("vPhone").value, username: document.getElementById("vUsername").value, password: document.getElementById("vPassword").value };
          const {data} = await callApi(`${API_BASE}/api/organizer/volunteer`, { method: 'POST', headers, body: JSON.stringify(body) });
          if(data.ok) alert("Success");
      };

      document.getElementById("addOrganizer").onclick = async () => {
          const body = { name: document.getElementById("oName").value, email: document.getElementById("oEmail").value, phone: document.getElementById("oPhone").value, username: document.getElementById("oUsername").value, password: document.getElementById("oPassword").value };
          const {data} = await callApi(`${API_BASE}/api/admin/organizer`, { method: 'POST', headers, body: JSON.stringify(body) });
          if(data.ok) { alert("Success"); loadStaffList(); }
      };

      // --- Contacts ---
      const modal = document.getElementById("contactsModal");
      window.closeContactsModal = () => modal.classList.add("hidden");
      document.getElementById("viewContactBtn").onclick = async () => {
        modal.classList.remove("hidden");
        const {data} = await callApi(`${API_BASE}/contacts`, { headers });
        const list = document.getElementById("contactsList"); 
        list.innerHTML = "";
        data.contacts?.forEach(c => {
          list.innerHTML += `<div class="bg-slate-800 p-4 rounded-xl border border-slate-700 relative group"><div class="flex justify-between"><h4 class="font-bold text-cyan-400">${c.name}</h4><button onclick="deleteMessage(${c.id})" class="text-rose-500"><i class="fa-solid fa-trash"></i></button></div><p class="text-xs text-slate-400">${c.email}</p><p class="text-sm bg-slate-950 p-2 rounded mt-2">${c.message}</p></div>`;
        });
      };
      window.deleteMessage = async (id) => {
          if(confirm("Delete?")) { await callApi(`${API_BASE}/contacts/${id}`, { method: "DELETE", headers }); document.getElementById("viewContactBtn").click(); }
      };

    })();
  </script>
</body>
</html>
