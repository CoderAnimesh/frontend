<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Volunteer Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- QR Scanner library -->
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-800 to-indigo-900 text-white p-6">
  <div class="max-w-2xl mx-auto">
    <header class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-bold">Volunteer Panel</h1>
      <button id="logout" class="px-3 py-2 bg-rose-500 rounded">Logout</button>
    </header>

    <!-- Manual Code Input -->
    <div class="p-6 bg-white/5 rounded-lg mb-6">
      <h3 class="font-semibold mb-2">Verify Participant Code & allocate PC</h3>
      <input id="code" placeholder="Enter participant code (TECH1234)" class="w-full p-3 rounded bg-white/6 mb-3 text-black"/>
      <button id="verifyBtn" class="px-4 py-2 bg-indigo-500 rounded">Verify & Allocate</button>
      
      <!-- Loader -->
      <div id="loader" class="hidden mt-4 flex justify-center">
        <div class="w-8 h-8 border-4 border-indigo-400 border-t-transparent rounded-full animate-spin"></div>
      </div>

      <!-- Result -->
      <div id="result" class="mt-3"></div>
    </div>

    <!-- QR Code Scanner -->
    <div class="p-6 bg-white/5 rounded-lg">
      <h3 class="font-semibold mb-2">Scan Participant QR</h3>
      <button id="startScan" class="px-4 py-2 bg-green-500 rounded">Start Camera & Scan</button>
      <button id="stopScan" class="hidden px-4 py-2 bg-rose-500 rounded ml-2">Stop</button>

      <!-- Camera View -->
      <div id="qr-reader" class="mt-4 hidden"></div>
    </div>
  </div>

<script>
(async ()=>{
  const token = localStorage.getItem("techathon_token");
  if (!token) { location.href = "../index.html"; return; }
  const headers = { "Content-Type":"application/json", Authorization: "Bearer " + token };

  const loader = document.getElementById("loader");
  const result = document.getElementById("result");

  function showLoader() { loader.classList.remove("hidden"); }
  function hideLoader() { loader.classList.add("hidden"); }

  document.getElementById("logout").addEventListener("click", ()=>{
    localStorage.removeItem("techathon_token");
    location.href="../login.html";
  });

  // ---- Manual Verify ----
  document.getElementById("verifyBtn").addEventListener("click", ()=> {
    const code = document.getElementById("code").value.trim();
    if (!code) return alert("Enter code");
    verifyCode(code);
  });

  // ---- QR Scanner ----
  const startBtn = document.getElementById("startScan");
  const stopBtn = document.getElementById("stopScan");
  const qrReader = document.getElementById("qr-reader");
  let scanner;

  startBtn.addEventListener("click", ()=>{
    qrReader.classList.remove("hidden");
    startBtn.classList.add("hidden");
    stopBtn.classList.remove("hidden");

    scanner = new Html5Qrcode("qr-reader");
    scanner.start(
      { facingMode: "environment" }, // rear camera
      { fps: 10, qrbox: 250 },
      qrCodeMessage => {
        // Stop scanning once code is detected
        scanner.stop().then(()=>{
          qrReader.classList.add("hidden");
          startBtn.classList.remove("hidden");
          stopBtn.classList.add("hidden");
        });
        verifyCode(qrCodeMessage);
      },
      errorMessage => {
        // ignore scanning errors
      }
    ).catch(err=>{
      alert("Camera start failed: " + err);
    });
  });

  stopBtn.addEventListener("click", ()=>{
    if(scanner){
      scanner.stop().then(()=>{
        qrReader.classList.add("hidden");
        startBtn.classList.remove("hidden");
        stopBtn.classList.add("hidden");
      });
    }
  });

  // ---- Shared Verify Function ----
  async function verifyCode(code){
    showLoader();
    result.textContent="";
    try {
      const res = await fetch("https://backend-960i.onrender.com/api/verify-code", { 
        method:"POST", headers, body: JSON.stringify({ code }) 
      });
      const data = await res.json();
      hideLoader();
      if (!res.ok || !data.ok) {
        result.textContent = data.message || "Failed"; 
        result.className = "mt-3 text-rose-300"; 
        return;
      }
      result.textContent = "✅ Allocated PC #: " + data.pc;
      result.className = "mt-3 text-green-300";
    } catch (err) {
      hideLoader();
      result.textContent = "🚨 Error: " + err.message;
      result.className = "mt-3 text-rose-300";
    }
  }
})();
</script>
</body>
</html>
