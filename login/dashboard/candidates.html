<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Candidates Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  <style>
    #loaderOverlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.7); display: none; justify-content: center; align-items: center; z-index: 1000;
    }
    .spinner {
      border: 6px solid #f3f3f3; border-top: 6px solid #4ade80;
      border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>

<body class="bg-gray-900 text-white min-h-screen p-6">
  <div id="loaderOverlay"><div class="spinner"></div></div>

  <div class="max-w-7xl mx-auto">
    <h1 class="text-3xl font-bold mb-6 text-center text-indigo-400">Candidate Management Dashboard</h1>

    <div class="bg-gray-800 p-4 rounded-lg mb-6 flex flex-wrap gap-4 items-end border border-gray-700">
      <div class="flex-1 min-w-[200px]">
        <label class="block mb-1 font-semibold text-sm">Select Event</label>
        <select id="eventFilter" class="p-2 rounded bg-gray-700 text-white w-full border border-gray-600 focus:border-indigo-500 outline-none"></select>
      </div>
      <button id="loadEventParticipants" class="px-6 py-2 bg-indigo-600 rounded hover:bg-indigo-500 font-bold transition">Load Data</button>
      <button id="exportPdfBtn" class="px-6 py-2 bg-red-600 rounded hover:bg-red-500 font-bold hidden transition">Export PDF</button>
    </div>

    <div id="filterSection" class="mb-4 grid grid-cols-1 md:grid-cols-3 gap-4 hidden">
      <input type="text" id="searchInput" placeholder="Search by Name, Batch, or Language..." 
             class="p-2 rounded bg-gray-700 border border-gray-600 w-full focus:ring-2 focus:ring-indigo-500 outline-none" onkeyup="filterTable()">
      <div class="bg-gray-800 p-2 rounded border border-indigo-500 text-center flex items-center justify-center">
        Total Found: <span id="countVal" class="font-bold ml-2 text-green-400">0</span>
      </div>
    </div>

    <div class="overflow-x-auto">
        <table class="w-full border-collapse border border-gray-700 mb-10 hidden" id="candidateTableWrapper">
          <thead class="bg-gray-800 text-indigo-300">
            <tr>
              <th class="p-3 border border-gray-700">#</th>
              <th class="p-3 border border-gray-700">Name</th>
              <th class="p-3 border border-gray-700">Sem</th>
              <th class="p-3 border border-gray-700">Batch</th>
              <th class="p-3 border border-gray-700">Phone</th>
              <th class="p-3 border border-gray-700">Email</th>
              <th class="p-3 border border-gray-700">Language</th>
              <th class="p-3 border border-gray-700 text-center">Actions</th>
            </tr>
          </thead>
          <tbody id="candidateTable" class="bg-gray-700"></tbody>
        </table>
    </div>

    <div id="editFormWrapper" class="hidden mt-10 p-6 bg-gray-800 rounded-xl border border-indigo-500">
      <h2 class="text-2xl font-bold mb-4 text-indigo-400">Update Candidate Details</h2>
      <form id="editForm" class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <input type="hidden" id="editId" />
        <div>
          <label class="block mb-1 text-sm text-gray-400">Full Name</label>
          <input id="editName" class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded focus:border-indigo-500" />
        </div>
        <div>
          <label class="block mb-1 text-sm text-gray-400">Email</label>
          <input id="editEmail" type="email" class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded" />
        </div>
        <div>
          <label class="block mb-1 text-sm text-gray-400">Phone Number</label>
          <input id="editPhone" class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded" />
        </div>
        <div>
          <label class="block mb-1 text-sm text-gray-400">Semester</label>
          <input id="editSemester" type="number" class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded" />
        </div>
        <div>
          <label class="block mb-1 text-sm text-gray-400">Batch</label>
          <input id="editBatch" class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded" />
        </div>
        <div>
          <label class="block mb-1 text-sm text-gray-400">Language</label>
          <select id="editLanguage" class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded">
            <option value="C">C</option><option value="C++">C++</option><option value="Java">Java</option>
            <option value="Python">Python</option><option value="JavaScript">JavaScript</option>
          </select>
        </div>
        <div class="md:col-span-3 flex justify-end space-x-3 mt-4">
          <button type="button" onclick="cancelEdit()" class="px-5 py-2 bg-gray-600 rounded hover:bg-gray-500 transition">Cancel</button>
          <button type="submit" class="px-5 py-2 bg-green-600 rounded hover:bg-green-500 font-bold transition">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const token = localStorage.getItem("techathon_token");
    const headers = { "Content-Type": "application/json", Authorization: "Bearer " + token };
    const loaderOverlay = document.getElementById("loaderOverlay");
    const tbody = document.getElementById("candidateTable");
    const tableWrapper = document.getElementById("candidateTableWrapper");
    const filterSection = document.getElementById("filterSection");
    const exportBtn = document.getElementById("exportPdfBtn");
    const eventFilter = document.getElementById("eventFilter");

    const showLoader = () => loaderOverlay.style.display = "flex";
    const hideLoader = () => loaderOverlay.style.display = "none";

    async function fetchEvents() {
      showLoader();
      try {
        const res = await fetch("https://backend-ab1p.onrender.com/api/events", { headers });
        const data = await res.json();
        if (data.ok) {
          eventFilter.innerHTML = data.events.map(ev => 
            `<option value="${ev.id}">${ev.name} (${new Date(ev.end_date).toLocaleDateString()})</option>`
          ).join('');
        }
      } catch (err) { console.error(err); } finally { hideLoader(); }
    }

    async function loadCandidates() {
      const eventId = eventFilter.value;
      if (!eventId) return;
      showLoader();
      tbody.innerHTML = "";
      try {
        const res = await fetch(`https://backend-ab1p.onrender.com/api/events/${eventId}/participants`, { headers });
        const data = await res.json();
        
        if (!data.participants || data.participants.length === 0) {
          tbody.innerHTML = `<tr><td colspan="8" class="p-3 text-center text-gray-400">No candidates found</td></tr>`;
        } else {
          data.participants.forEach((p, index) => {
            const tr = document.createElement("tr");
            tr.className = "candidate-row border-b border-gray-600 hover:bg-gray-800 transition";
            tr.innerHTML = `
              <td class="p-3 text-gray-400 text-sm font-mono">${index + 1}</td>
              <td class="p-3 font-semibold">${p.name}</td>
              <td class="p-3 text-center">${p.semester || '-'}</td>
              <td class="p-3">${p.batch || 'N/A'}</td>
              <td class="p-3">${p.phone || 'N/A'}</td>
              <td class="p-3 text-sm">${p.email}</td>
              <td class="p-3"><span class="px-2 py-0.5 bg-indigo-900/50 text-indigo-300 border border-indigo-500 rounded text-xs">${p.preferred_language}</span></td>
              <td class="p-3 text-center space-x-2">
                <button class="editBtn text-yellow-500 hover:text-yellow-300 underline text-sm" 
                  data-id="${p.id}" data-name="${p.name}" data-email="${p.email}" 
                  data-language="${p.preferred_language}" data-batch="${p.batch || ''}" 
                  data-phone="${p.phone || ''}" data-sem="${p.semester || ''}">Edit</button>
                <button class="deleteBtn text-red-500 hover:text-red-300 underline text-sm" onclick="deleteParticipant('${p.id}')">Delete</button>
              </td>
            `;
            tbody.appendChild(tr);
          });
        }
        tableWrapper.classList.remove("hidden");
        filterSection.classList.remove("hidden");
        exportBtn.classList.remove("hidden");
        filterTable();
      } catch (err) { alert("Error loading candidates"); } finally { hideLoader(); }
    }

    // UPDATE LOGIC
    document.getElementById("editForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const id = document.getElementById("editId").value;
      const payload = {
        name: document.getElementById("editName").value,
        email: document.getElementById("editEmail").value,
        phone: document.getElementById("editPhone").value,
        semester: document.getElementById("editSemester").value,
        batch: document.getElementById("editBatch").value,
        language: document.getElementById("editLanguage").value
      };

      showLoader();
      try {
        const res = await fetch(`https://backend-ab1p.onrender.com/api/participants/${id}`, {
          method: "PUT", headers, body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (data.ok) {
          alert("Candidate updated successfully!");
          cancelEdit();
          loadCandidates();
        } else { alert(data.message || "Update failed"); }
      } catch (err) { alert("Server error during update"); } finally { hideLoader(); }
    });

    // DELETE LOGIC
    async function deleteParticipant(id) {
      if (!confirm("Are you sure you want to delete this candidate? This action cannot be undone.")) return;
      showLoader();
      try {
        const res = await fetch(`https://backend-ab1p.onrender.com/api/participants/${id}`, { method: "DELETE", headers });
        const data = await res.json();
        if (data.ok) { loadCandidates(); } else { alert("Delete failed"); }
      } catch (err) { alert("Error deleting user"); } finally { hideLoader(); }
    }

    // PDF EXPORT
    function exportToPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'mm', 'a4'); // Landscape for more columns
        const eventName = eventFilter.options[eventFilter.selectedIndex].text;
        
        doc.text(`Registered Candidates: ${eventName}`, 14, 15);
        
        const visibleRows = Array.from(document.querySelectorAll(".candidate-row")).filter(r => r.style.display !== "none");
        const tableData = visibleRows.map((row, i) => {
            const c = row.querySelectorAll("td");
            return [i + 1, c[1].innerText, c[2].innerText, c[3].innerText, c[4].innerText, c[5].innerText, c[6].innerText];
        });

        doc.autoTable({
            head: [['#', 'Name', 'Sem', 'Batch', 'Phone', 'Email', 'Language']],
            body: tableData,
            startY: 25,
            theme: 'striped',
            headStyles: { fillColor: [79, 70, 229] }
        });
        doc.save("Candidate_List.pdf");
    }

    function filterTable() {
      const input = document.getElementById("searchInput").value.toLowerCase();
      const rows = document.querySelectorAll(".candidate-row");
      let visibleCount = 0;
      rows.forEach(row => {
        const text = row.innerText.toLowerCase();
        row.style.display = text.includes(input) ? "" : "none";
        if (row.style.display === "") visibleCount++;
      });
      document.getElementById("countVal").innerText = visibleCount;
    }

    tbody.addEventListener("click", e => {
      if (e.target.classList.contains("editBtn")) {
        const b = e.target.dataset;
        document.getElementById("editId").value = b.id;
        document.getElementById("editName").value = b.name;
        document.getElementById("editEmail").value = b.email;
        document.getElementById("editPhone").value = b.phone;
        document.getElementById("editSemester").value = b.sem;
        document.getElementById("editBatch").value = b.batch;
        document.getElementById("editLanguage").value = b.language;
        document.getElementById("editFormWrapper").classList.remove("hidden");
        window.scrollTo({ top: document.getElementById("editFormWrapper").offsetTop, behavior: "smooth" });
      }
    });

    function cancelEdit() { document.getElementById("editFormWrapper").classList.add("hidden"); }
    document.getElementById("loadEventParticipants").addEventListener("click", loadCandidates);
    document.getElementById("exportPdfBtn").addEventListener("click", exportToPDF);
    fetchEvents();
  </script>
</body>
</html>
