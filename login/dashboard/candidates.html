<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <title>Candidates</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    #loaderOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      display: none;
    }

    .spinner {
      border: 6px solid #f3f3f3;
      border-top: 6px solid #4ade80;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body class="bg-gray-900 text-white min-h-screen p-6">
  <!-- Full screen loader -->
  <div id="loaderOverlay">
    <div class="spinner"></div>
  </div>

  <div class="max-w-6xl mx-auto">
    <h1 class="text-3xl font-bold mb-6 text-center">Registered Candidates</h1>

    <!-- Event Selector -->
    <div class="mb-4">
      <label for="eventFilter" class="block mb-1 font-semibold">Select Event</label>
      <select id="eventFilter" class="p-2 rounded bg-gray-700 text-white w-full md:w-1/3"></select>
      <button id="loadEventParticipants" class="mt-2 px-4 py-2 bg-indigo-500 rounded hover:bg-indigo-400">Load
        Participants</button>
    </div>

    <!-- Table -->
    <table class="w-full border-collapse border border-gray-700 mb-10 hidden" id="candidateTableWrapper">
      <thead class="bg-gray-800">
        <tr>
          <th class="p-3 border border-gray-700">ID</th>
          <th class="p-3 border border-gray-700">Name</th>
          <th class="p-3 border border-gray-700">Email</th>
          <th class="p-3 border border-gray-700">Language</th>
          <th class="p-3 border border-gray-700">Event</th>
          <th class="p-3 border border-gray-700">Action</th>
        </tr>
      </thead>
      <tbody id="candidateTable" class="bg-gray-700"></tbody>
    </table>

    <!-- Edit Form -->
    <div id="editFormWrapper" class="hidden">
      <h2 class="text-2xl font-semibold mb-4">Edit Candidate</h2>
      <form id="editForm" class="bg-gray-800 p-6 rounded-lg space-y-4">
        <input type="hidden" id="editId" />

        <div>
          <label class="block mb-1">Name</label>
          <input id="editName" class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded" />
        </div>

        <div>
          <label class="block mb-1">Email</label>
          <input id="editEmail" type="email" class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded" />
        </div>

        <div>
          <label class="block mb-1">Language</label>
          <select id="editLanguage" class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded">
            <option value="C">C</option>
            <option value="C++">C++</option>
            <option value="Java">Java</option>
            <option value="Python">Python</option>
            <option value="JavaScript">JavaScript</option>
          </select>
        </div>

        <div>
          <label class="block mb-1">Event</label>
          <input id="editEvent" class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded" disabled />
        </div>

        <div class="flex justify-end space-x-3">
          <button type="button" onclick="cancelEdit()"
            class="px-4 py-2 bg-gray-600 rounded hover:bg-gray-500">Cancel</button>
          <button type="submit" class="px-4 py-2 bg-green-600 rounded hover:bg-green-500">Update</button>
        </div>
      </form>
    </div>
  </div>

  <script>
const token = localStorage.getItem("techathon_token");
const headers = { "Content-Type": "application/json", Authorization: "Bearer " + token };
const loaderOverlay = document.getElementById("loaderOverlay");
const tbody = document.getElementById("candidateTable");
const tableWrapper = document.getElementById("candidateTableWrapper");
const eventFilter = document.getElementById("eventFilter");

const showLoader = () => loaderOverlay.style.display = "flex";
const hideLoader = () => loaderOverlay.style.display = "none";

// Fetch events
async function fetchEvents() {
  showLoader();
  try {
    const res = await fetch("https://backend-f64w.onrender.com/api/events", { headers });
    const data = await res.json();
    if (!data.ok) throw new Error("Failed to fetch events");
    eventFilter.innerHTML = "";
    data.events.forEach(ev => {
      const opt = document.createElement("option");
      opt.value = ev.id;
      opt.textContent = `${ev.name} (ends: ${new Date(ev.end_date).toLocaleDateString()})`;
      eventFilter.appendChild(opt);
    });
  } catch (err) {
    console.error(err);
    alert("Error fetching events");
  } finally { hideLoader(); }
}

// Load participants
async function loadCandidates() {
  const eventId = eventFilter.value;
  const eventName = eventFilter.options[eventFilter.selectedIndex].text.split(' (')[0];
  if (!eventId) return alert("Select an event");

  showLoader();
  tbody.innerHTML = "";
  tableWrapper.classList.add("hidden");

  try {
    const res = await fetch(`https://backend-f64w.onrender.com/api/events/${eventId}/participants`, { headers });
    const data = await res.json();
    if (!data.ok) throw new Error(data.message || "Failed to load participants");

    if (data.participants.length === 0) {
      tbody.innerHTML = `<tr><td colspan="6" class="p-3 text-center">No candidates found</td></tr>`;
    } else {
      data.participants.forEach(p => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td class="p-3 border border-gray-600">${p.id}</td>
          <td class="p-3 border border-gray-600">${p.name}</td>
          <td class="p-3 border border-gray-600">${p.email}</td>
          <td class="p-3 border border-gray-600">${p.preferred_language}</td>
          <td class="p-3 border border-gray-600">${eventName}</td>
          <td class="p-3 border border-gray-600">
            <button class="editBtn px-3 py-1 bg-yellow-600 rounded hover:bg-yellow-500"
              data-id="${p.id}"
              data-name="${p.name}"
              data-email="${p.email}"
              data-language="${p.preferred_language}"
            >Edit</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }
    tableWrapper.classList.remove("hidden");
  } catch (err) {
    console.error(err);
    tbody.innerHTML = `<tr><td colspan="6" class="p-3 text-center text-red-400">Error fetching candidates</td></tr>`;
    tableWrapper.classList.remove("hidden");
  } finally { hideLoader(); }
}

// Handle edit button clicks
tbody.addEventListener("click", e => {
  if (e.target.classList.contains("editBtn")) {
    const btn = e.target;
    document.getElementById("editId").value = btn.dataset.id;
    document.getElementById("editName").value = btn.dataset.name;
    document.getElementById("editEmail").value = btn.dataset.email;
    document.getElementById("editLanguage").value = btn.dataset.language;
    document.getElementById("editEvent").value = btn.dataset.event;
    document.getElementById("editFormWrapper").classList.remove("hidden");
    window.scrollTo({top: document.getElementById("editFormWrapper").offsetTop, behavior:"smooth"});
  }
});

// Cancel edit
function cancelEdit() {
  document.getElementById("editFormWrapper").classList.add("hidden");
}

// Update participant
document.getElementById("editForm").addEventListener("submit", async e => {
  e.preventDefault();
  const participantId = document.getElementById("editId").value;
  const name = document.getElementById("editName").value.trim();
  const email = document.getElementById("editEmail").value.trim();
  const language = document.getElementById("editLanguage").value;

  if (!name || !email || !language) {
    return alert("Please fill all fields!");
  }

  showLoader();
  try {
    const res = await fetch(`https://backend-f64w.onrender.com/api/participants/${participantId}`, {
      method: "PUT",
      headers,
      body: JSON.stringify({ name, email, language })
    });
    const data = await res.json();
    if (data.ok) {
      alert("Participant updated successfully!");
      cancelEdit();
      loadCandidates();
    } else {
      alert(data.message || "Failed to update participant");
    }
  } catch(err) {
    console.error(err);
    alert("Error updating participant");
  } finally { hideLoader(); }
});

// Load participants button
document.getElementById("loadEventParticipants").addEventListener("click", loadCandidates);

// Load events on page load
fetchEvents();
// Redirect to gallery page


</script>
</body>

</html>
