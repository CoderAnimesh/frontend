<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Gallery Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    /* Loader */
    #loaderOverlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(15, 23, 42, 0.95);
      display: flex; justify-content: center; align-items: center; flex-direction: column;
      z-index: 2000; display: none;
    }
    .spinner {
      border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #4ade80;
      border-radius: 50%; width: 50px; height: 50px;
      animation: spin 1s linear infinite; margin-bottom: 1rem;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    /* Modal */
    .modal-backdrop {
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(4px);
    }
    
    .img-container {
      max-height: 400px;
      background-color: #333;
      border-radius: 8px;
      overflow: hidden;
    }
    .img-container img { max-width: 100%; }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen font-sans relative">

  <div id="loaderOverlay">
    <div class="spinner"></div>
    <div id="loaderText" class="text-green-400 font-semibold tracking-wide">Processing...</div>
  </div>

  <div class="absolute top-6 right-6 z-50">
    <button onclick="openManageModal()" class="flex items-center gap-2 bg-red-600 hover:bg-red-500 text-white px-5 py-2 rounded-full shadow-lg transition transform hover:scale-105 font-semibold">
      <i class="fa-solid fa-trash-can"></i> Manage / Delete Images
    </button>
  </div>

  <div class="max-w-4xl mx-auto p-8 pt-20">
    <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl border border-gray-700">
      <h1 class="text-4xl font-extrabold mb-8 text-center text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-blue-500">
        Upload Gallery Image
      </h1>

      <form id="galleryForm" class="space-y-6">
        <div>
          <label class="block mb-2 text-gray-300 font-semibold">Select Event</label>
          <select id="eventSelect" class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 text-white focus:ring-2 focus:ring-green-500 outline-none">
            <option value="">Loading events...</option>
          </select>
        </div>

        <div>
          <label class="block mb-2 text-gray-300 font-semibold">Choose Image</label>
          <input type="file" id="imageInput" accept="image/*" class="w-full p-2 rounded-lg bg-gray-700 border border-gray-600 text-gray-300 cursor-pointer" />
        </div>

        <div id="cropperArea" class="hidden">
          <div class="img-container">
            <img id="cropperImage" src="" alt="To Crop">
          </div>
          <button type="button" id="cropBtn" class="w-full py-3 bg-indigo-600 hover:bg-indigo-500 rounded-lg font-bold transition shadow-lg">
            ✂️ Crop Image
          </button>
        </div>

        <div id="previewArea" class="hidden text-center bg-gray-700/50 p-4 rounded-xl border border-dashed border-gray-500">
          <p class="text-green-400 font-semibold mb-3">✓ Image Ready</p>
          <img id="previewImage" class="max-h-64 mx-auto rounded-lg shadow-md border border-gray-600" />
        </div>

        <div>
          <label class="block mb-2 text-gray-300 font-semibold">Description</label>
          <textarea id="imageDesc" rows="2" class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 text-white focus:ring-2 focus:ring-green-500 outline-none"></textarea>
        </div>

        <div class="pt-4">
          <button type="submit" id="uploadBtn" class="w-full py-4 bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-400 hover:to-emerald-500 rounded-xl font-bold text-lg shadow-xl transition disabled:opacity-50 disabled:cursor-not-allowed" disabled>
            🚀 Upload to Drive
          </button>
        </div>
      </form>
    </div>
  </div>

  <div id="manageModal" class="fixed inset-0 modal-backdrop z-[100] hidden flex justify-center items-center p-4">
    <div class="bg-gray-800 w-full max-w-5xl h-[85vh] rounded-2xl shadow-2xl flex flex-col border border-gray-700">
      
      <div class="p-6 border-b border-gray-700 flex justify-between items-center">
        <h2 class="text-2xl font-bold text-white"><i class="fa-solid fa-layer-group text-blue-400 mr-2"></i> Manage Gallery</h2>
        <button onclick="closeManageModal()" class="text-gray-400 hover:text-white text-2xl"><i class="fa-solid fa-times"></i></button>
      </div>

      <div class="p-6 flex-1 overflow-hidden flex flex-col">
        <div class="mb-6">
          <label class="block mb-2 text-sm text-gray-400">Filter by Event:</label>
          <select id="manageEventSelect" onchange="loadManageImages()" class="w-full p-3 rounded-lg bg-gray-900 border border-gray-600 text-white focus:ring-2 focus:ring-blue-500 outline-none">
            <option value="">Select an Event to view images...</option>
          </select>
        </div>

        <div id="manageGrid" class="flex-1 overflow-y-auto grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 pr-2">
          <div class="col-span-full text-center text-gray-500 mt-10">Select an event to load images.</div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
  
  <script>
    const API_BASE = "http://localhost:5000";
    const token = localStorage.getItem("techathon_token");
    const loader = document.getElementById("loaderOverlay");
    const loaderText = document.getElementById("loaderText");

    if (!token) window.location.href = "/organizer-login.html";
    const headers = { Authorization: "Bearer " + token };

    // --- Variables ---
    let cropper = null, finalBlob = null;
    let eventsList = [];

    // --- Initial Load ---
    async function loadEvents() {
      try {
        const res = await fetch(`${API_BASE}/api/events`, { headers });
        const data = await res.json();
        
        const uploadSelect = document.getElementById("eventSelect");
        const manageSelect = document.getElementById("manageEventSelect");
        
        uploadSelect.innerHTML = '<option value="">-- Select Event --</option>';
        manageSelect.innerHTML = '<option value="">-- Select Event --</option>';

        if(data.events) {
          eventsList = data.events;
          data.events.forEach(ev => {
            const label = `${ev.name} (${new Date(ev.start_date).toLocaleDateString()})`;
            
            // Populate Upload Dropdown
            const opt1 = document.createElement("option");
            opt1.value = ev.id; opt1.textContent = label;
            uploadSelect.appendChild(opt1);

            // Populate Manage Dropdown
            const opt2 = document.createElement("option");
            opt2.value = ev.id; opt2.textContent = label;
            manageSelect.appendChild(opt2);
          });
        }
      } catch (err) { console.error(err); }
    }
    loadEvents();

    // --- Image Upload Logic (Existing) ---
   // --- Image Upload Logic ---
document.getElementById("imageInput").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    document.getElementById("cropperArea").classList.remove("hidden");
    document.getElementById("previewArea").classList.add("hidden");
    document.getElementById("uploadBtn").disabled = true;
    if(cropper) cropper.destroy();
    document.getElementById("cropperImage").src = reader.result;

    // UPDATE THIS SECTION BELOW
    cropper = new Cropper(document.getElementById("cropperImage"), { 
      aspectRatio: null, // This allows free cropping (no fixed ratio)
      viewMode: 1, 
      autoCropArea: 1,
      dragMode: 'move', // Optional: allows moving the image
      responsive: true,
      restore: false,
    });
  };
  reader.readAsDataURL(file);
});
    document.getElementById("cropBtn").addEventListener("click", () => {
      if (!cropper) return;
      cropper.getCroppedCanvas({ width: 1280, height: 720 }).toBlob((blob) => {
        finalBlob = blob;
        document.getElementById("previewImage").src = URL.createObjectURL(blob);
        document.getElementById("previewArea").classList.remove("hidden");
        document.getElementById("cropperArea").classList.add("hidden");
        document.getElementById("uploadBtn").disabled = false;
        document.getElementById("uploadBtn").textContent = "🚀 Upload to Drive";
      }, 'image/jpeg', 0.9);
    });

    document.getElementById("galleryForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const eventId = document.getElementById("eventSelect").value;
      const description = document.getElementById("imageDesc").value;
      if (!eventId || !finalBlob) return alert("Select event & crop image");

      const formData = new FormData();
      formData.append("image", finalBlob, `gallery-${Date.now()}.jpg`);
      formData.append("description", description);

      loaderText.textContent = "Uploading to Drive...";
      loader.style.display = "flex";

      try {
        const res = await fetch(`${API_BASE}/api/organizer/gallery/${eventId}`, {
          method: "POST", headers: { Authorization: "Bearer " + token }, body: formData
        });
        const data = await res.json();
        if (data.ok) {
          alert("Uploaded Successfully!");
          window.location.reload();
        } else throw new Error(data.message);
      } catch (err) { alert(err.message); } 
      finally { loader.style.display = "none"; }
    });

    // ==========================================
    // MANAGE / DELETE LOGIC
    // ==========================================

    function openManageModal() {
      document.getElementById("manageModal").classList.remove("hidden");
    }
    function closeManageModal() {
      document.getElementById("manageModal").classList.add("hidden");
    }

    async function loadManageImages() {
      const eventId = document.getElementById("manageEventSelect").value;
      const grid = document.getElementById("manageGrid");
      grid.innerHTML = '<div class="col-span-full flex justify-center py-10"><div class="spinner border-blue-500"></div></div>';

      if(!eventId) {
        grid.innerHTML = '<div class="col-span-full text-center text-gray-500 mt-10">Select an event to load images.</div>';
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/api/gallery/${eventId}`);
        const data = await res.json();

        grid.innerHTML = "";

        if(data.images && data.images.length > 0) {
          data.images.forEach(img => {
            const card = document.createElement("div");
            card.className = "relative bg-gray-900 rounded-lg overflow-hidden group border border-gray-700";
            
            // Check for drive link
            const src = img.image_path.startsWith("http") ? img.image_path : `${API_BASE}${img.image_path}`;

            card.innerHTML = `
              <img src="${src}" class="w-full h-40 object-cover opacity-80 group-hover:opacity-100 transition">
              <div class="p-2 text-xs text-gray-400 truncate">${img.description || 'No Description'}</div>
              
              <div class="absolute inset-0 bg-black/60 flex items-center justify-center opacity-0 group-hover:opacity-100 transition">
                <button onclick="deleteImage(${img.id})" class="bg-red-600 hover:bg-red-500 text-white px-4 py-2 rounded-full font-bold shadow-lg transform hover:scale-110 transition">
                  <i class="fa-solid fa-trash"></i> Delete
                </button>
              </div>
            `;
            grid.appendChild(card);
          });
        } else {
          grid.innerHTML = '<div class="col-span-full text-center text-gray-400 py-10">No images found for this event.</div>';
        }
      } catch(err) {
        console.error(err);
        grid.innerHTML = '<div class="col-span-full text-center text-red-400">Failed to load images.</div>';
      }
    }

    async function deleteImage(imageId) {
      if(!confirm("Are you sure? This will delete the image from Gallery AND Google Drive permanently.")) return;

      loaderText.textContent = "Deleting...";
      loader.style.display = "flex";

      try {
        const res = await fetch(`${API_BASE}/api/organizer/gallery/${imageId}`, {
          method: "DELETE",
          headers
        });
        const data = await res.json();

        if(data.ok) {
          // Remove from UI without reload
          loadManageImages(); 
        } else {
          alert("Delete failed: " + data.message);
        }
      } catch(err) {
        alert("Error deleting image.");
        console.error(err);
      } finally {
        loader.style.display = "none";
      }
    }
  </script>
</body>
</html>
