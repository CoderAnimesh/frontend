<!doctype html>
<html>
<head>
  <meta charset="utf-8" /><title>Reset Password — Quantum Quirks</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-900 text-white flex items-center justify-center p-6">
  
  <div id="mainContainer" class="max-w-md w-full bg-slate-800 p-8 rounded-3xl border border-white/10 shadow-2xl">
    <div id="verifying" class="text-center py-10">
        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-500 mx-auto mb-4"></div>
        <p class="text-slate-400">Verifying security token...</p>
    </div>

    <div id="resetContent" class="hidden">
        <h2 class="text-2xl font-bold text-indigo-400 mb-2">New Password</h2>
        <p class="text-slate-400 text-sm mb-6">Link verified. Please update your credentials.</p>
        
        <form id="resetForm" class="space-y-4">
          <input id="newPass" type="password" placeholder="New Password" required class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 outline-none focus:border-indigo-500" />
          <input id="confPass" type="password" placeholder="Confirm Password" required class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 outline-none focus:border-indigo-500" />
          <button type="submit" class="w-full py-3 bg-indigo-600 hover:bg-indigo-500 rounded-xl font-bold transition">Update Password</button>
        </form>
    </div>

    <div id="errorContent" class="hidden text-center py-10">
        <div class="text-rose-500 text-5xl mb-4">⚠️</div>
        <h3 class="text-xl font-bold mb-2">Access Blocked</h3>
        <p id="errorMsg" class="text-slate-400 text-sm mb-6">This link is invalid, expired, or has already been used.</p>
        <a href="../login.html" class="text-indigo-400 underline">Back to Login</a>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");
    const API_BASE = "http://localhost:5000";

    // 1. Immediate Validation on Page Load
    async function validateLink() {
        if (!token) {
            showError("No security token provided.");
            return;
        }

        try {
            const res = await fetch(`${API_BASE}/api/auth/validate-reset-token/${token}`);
            if (res.ok) {
                document.getElementById("verifying").classList.add("hidden");
                document.getElementById("resetContent").classList.remove("hidden");
            } else {
                const data = await res.json();
                showError(data.message);
            }
        } catch (e) { showError("Connection error."); }
    }

    function showError(msg) {
        document.getElementById("verifying").classList.add("hidden");
        document.getElementById("errorContent").classList.remove("hidden");
        document.getElementById("errorMsg").textContent = msg;
    }

    // 2. Handle Form Submit
    document.getElementById("resetForm").onsubmit = async (e) => {
        e.preventDefault();
        const password = document.getElementById("newPass").value;
        if (password !== document.getElementById("confPass").value) return alert("Passwords mismatch!");

        const res = await fetch(`${API_BASE}/api/auth/reset-password`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token, password })
        });

        if (res.ok) {
            alert("✅ Password Updated! Redirecting...");
            location.href = "../login.html";
        } else {
            alert("❌ Session expired or link already used.");
            location.reload();
        }
    };

    validateLink();
  </script>
</body>
</html>
