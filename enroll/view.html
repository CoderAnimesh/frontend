<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Quantum Quirks — Events</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/gsap@3.12.5/dist/gsap.min.js"></script>
  <style>
    /* Loader Styles */
    #loader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #0f172a; display: flex; justify-content: center; align-items: center; z-index: 9999;
    }
    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.1); border-top: 4px solid #818cf8; border-radius: 50%; width: 50px; height: 50px; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    /* Page Transition Overlay */
    #transition-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #4f46e5; /* Indigo-600 */
      z-index: 9998;
      transform: translateY(100%); /* Start hidden below */
      pointer-events: none;
    }

    /* Background Blobs */
    .blob {
      position: absolute; filter: blur(80px); opacity: 0.4; z-index: -1;
    }
    
    /* Glass Card Hover */
    .event-card { transition: transform 0.3s ease, box-shadow 0.3s ease; }
    .event-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.1); }
  </style>
</head>
<body class="bg-slate-900 text-white min-h-screen relative overflow-x-hidden font-sans">

  <div id="transition-overlay"></div>

  <div id="loader">
    <div class="spinner"></div>
  </div>

  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="blob bg-indigo-600 w-96 h-96 rounded-full top-0 left-0 -translate-x-1/2 -translate-y-1/2"></div>
    <div class="blob bg-purple-600 w-96 h-96 rounded-full bottom-0 right-0 translate-x-1/2 translate-y-1/2"></div>
  </div>

  <header class="p-10 text-center relative z-10 opacity-0" id="mainHeader">
    <h1 class="text-5xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-purple-400">
      Quantum Quirks
    </h1>
    <p class="mt-3 text-slate-400 text-lg">Select your challenge. Define your reality.</p>
  </header>

  <main class="p-6 max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="eventsContainer">
    </main>

  <script>
    const container = document.getElementById('eventsContainer');
    const loader = document.getElementById('loader');
    const overlay = document.getElementById('transition-overlay');

    // 1. Initial Page Load Animation
    window.addEventListener('load', () => {
        // Simple background movement
        gsap.to(".blob", { x: 50, y: 50, duration: 5, repeat: -1, yoyo: true, ease: "sine.inOut", stagger: 2 });
    });

    async function fetchEvents() {
      try {
        // Artificial delay just to show the smooth loader if API is too fast (Optional)
        // await new Promise(r => setTimeout(r, 500)); 

        const res = await fetch("http://localhost:5000/api/events");
        const data = await res.json();

        // Fade out loader
        gsap.to(loader, { opacity: 0, duration: 0.5, onComplete: () => loader.style.display = "none" });

        if (!data.ok) throw new Error(data.message || "Failed to fetch events");

        const now = new Date();

        container.innerHTML = data.events.map(ev => {
          const endDate = new Date(ev.end_date);
          const isDeadlinePassed = endDate < now;

          return `
            <div class="event-card bg-white/5 backdrop-blur-md p-8 rounded-3xl border border-white/10 flex flex-col justify-between h-full opacity-0 translate-y-10">
              <div>
                <div class="h-2 w-20 bg-gradient-to-r from-indigo-500 to-purple-500 rounded-full mb-4"></div>
                <h2 class="text-3xl font-bold text-white mb-2">${ev.name}</h2>
                <div class="text-xs font-mono text-indigo-300 mb-4 bg-indigo-500/10 inline-block px-2 py-1 rounded">
                  DEADLINE: ${endDate.toLocaleDateString()}
                </div>
                <p class="text-slate-400 leading-relaxed mb-6">${ev.description || 'Join us for an exciting event.'}</p>
              </div>
              
              <div class="pt-4 border-t border-white/5">
                <button 
                  class="w-full py-4 rounded-xl font-bold tracking-wide transition-all duration-300 transform active:scale-95
                  ${isDeadlinePassed 
                    ? 'bg-slate-700 text-slate-500 cursor-not-allowed' 
                    : 'bg-gradient-to-r from-indigo-600 to-violet-600 hover:shadow-[0_0_20px_rgba(99,102,241,0.5)] text-white'}"
                  ${isDeadlinePassed ? 'disabled' : ''}
                  onclick="enroll(${ev.id})"
                >
                  ${isDeadlinePassed ? 'REGISTRATION CLOSED' : 'ENROLL NOW →'}
                </button>
              </div>
            </div>
          `;
        }).join('');

        // 2. Animate Elements In
        animateEntrance();

      } catch (err) {
        loader.style.display = "none";
        console.error(err);
        container.innerHTML = `<div class="col-span-full text-center p-10 bg-red-500/10 border border-red-500/50 rounded-xl text-red-200">Failed to load events. Server might be offline.</div>`;
      }
    }

    function animateEntrance() {
        // Animate Header
        gsap.to("#mainHeader", { opacity: 1, y: 0, duration: 1, ease: "power2.out" });
        
        // Stagger Animate Cards
        gsap.to(".event-card", {
            opacity: 1,
            y: 0,
            duration: 0.8,
            stagger: 0.15,
            ease: "back.out(1.2)"
        });
    }

    function enroll(eventId) {
      // Store ID
      localStorage.setItem("selectedEventId", eventId);

      // 3. Exit Animation (The Transition)
      // Slide the blue overlay up from the bottom
      gsap.to(overlay, {
        y: "0%", 
        duration: 0.6, 
        ease: "power2.inOut",
        onComplete: () => {
            // Once the screen is covered, change the URL
            window.location.href = `enroll.html`;
        }
      });
    }

    fetchEvents();
  </script>
</body>
</html>
