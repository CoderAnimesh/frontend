<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quantam Quirks Enrollment</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="enroll.css">
</head>
<body>
  <div class="container">
    <h1>Quantam Quirks Enrollment Form</h1>

    <form id="enrollForm">
      <!-- Student Details -->
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required placeholder="Enter your full name">
      </div>
      <div class="form-group">
        <label for="Batch">Your Batch</label>
        <select id="batch" name="Batch" required>
          <option value="" disabled selected>Select Your Batch</option>
          <option value="C">BCA</option>
          <option value="C++">MCA</option>
          <option value="Java">BCA DS</option>
          <option value="Python">BVoc.</option>
        </select>
      </div>
      <div class="form-group">
        <label for="Semester">Select Semester</label>
        <select id="semester" name="Batch" required>
          <option value="" disabled selected>Select Semester</option>
          <option value="Sem 1">Semester I</option>
          <option value="Sem 2">Semester II</option>
          <option value="Sem 3">Semester III</option>
          <option value="Sem 4">Semester IV</option>
          <option value="Sem 5">Semester V</option>
          <option value="Sem 6">Semester VI</option>
          
        </select>
      </div>
      <div class="form-group">
        <label for="father">Father's Name</label>
        <input type="text" id="father" name="father" required placeholder="Enter father's name">
      </div>

      <div class="form-group">
        <label for="mother">Mother's Name</label>
        <input type="text" id="mother" name="mother" required placeholder="Enter mother's name">
      </div>

      <div class="form-group">
        <label for="gender">Gender</label>
        <select id="gender" name="gender" required>
          <option value="" disabled selected>Select gender</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <!-- Email & OTP -->
      <p class="note">⚠️ Please enter your correct email. Confirmation will be sent there!</p>

      <div class="form-group email-group">
        <label for="email">Email Address</label>
        <div class="email-box">
          <input type="email" id="email" name="email" required placeholder="Enter your email">
          <button type="button" id="sendOtpBtn">Send OTP</button>
        </div>
      </div>

      <div class="form-group otp-group" id="otpGroup" style="display: none;">
        <label for="otp">Enter OTP</label>
        <input type="text" id="otp" name="otp" placeholder="Enter OTP sent to your email">
        <button type="button" id="verifyOtpBtn">Verify OTP</button>
      </div>

      <!-- Phone & Language -->
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" required placeholder="Enter your phone number">
      </div>

      <div class="form-group">
        <label for="language">Preferred Coding Language</label>
        <select id="language" name="language" required>
          <option value="" disabled selected>Select your coding language</option>
          <option value="C">C</option>
          <option value="C++">C++</option>
          <option value="Java">Java</option>
          <option value="Python">Python</option>
        </select>
      </div>
      

      
      <!-- Final action button (CSS unchanged) -->
<button type="button" class="submit-btn" id="enrollBtn" disabled>Enroll Now</button>

    </form>
  </div>
  <!-- Loader Overlay -->
<div id="loader" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; 
background:rgba(0,0,0,0.6); z-index:9999; align-items:center; justify-content:center;">

<div class="wrapper">
  <div class="circle"></div>
  <div class="circle"></div>
  <div class="circle"></div>
  <div class="shadow"></div>
  <div class="shadow"></div>
  <div class="shadow"></div>
</div>

</div>

  
  <!-- Razorpay script -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

  <script src="enroll.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  
</body>
</html>
