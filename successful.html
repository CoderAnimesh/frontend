<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Enrollment Successful</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      color: #fff;
    }

    .container {
      text-align: center;
      animation: fadeIn 1.5s ease-in-out;
    }

    .checkmark {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      display: inline-block;
      background: #fff;
      position: relative;
      justify-content: center;
      align-items: center;
      animation: pop 0.6s ease forwards;
      margin-bottom: 20px;
    }

    .checkmark::after {
      content: "";
      position: absolute;
      left: 45px;
      top: 30px;
      width: 25px;
      height: 50px;
      border-right: 6px solid #4caf50;
      border-bottom: 6px solid #4caf50;
      transform: rotate(45deg);
      opacity: 0;
      animation: drawCheck 0.6s 0.5s forwards;
    }

    h1 {
      font-size: 2.5rem;
      margin: 10px 0;
      animation: slideDown 1s ease;
    }

    p {
      font-size: 1.2rem;
      margin: 10px 0;
    }

    .code-box {
      margin-top: 15px;
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      display: inline-block;
      font-weight: bold;
      font-size: 1.2rem;
      animation: pulse 1.5s infinite;
    }

    @keyframes pop {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes drawCheck {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideDown {
      from { transform: translateY(-30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    /* Confetti animation */
    .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      background: #fff;
      top: -10px;
      opacity: 0.8;
      animation: fall 3s linear infinite;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="checkmark"></div>
    <h1>Enrollment Successful 🎉</h1>
    <p>Thank you for enrolling in Quantam Quirks!</p>
    <div class="code-box">Your Code: <span id="enrollCode"></span></div>
    <p style="margin-top:20px;font-size:0.9rem;color:#eee;">Redirecting to home in 10 seconds...</p>
  </div>

  <script>
    // Extract enrollment code from URL
    const params = new URLSearchParams(window.location.search);
    document.getElementById("enrollCode").textContent = params.get("code") || "N/A";

    // Generate confetti
    for (let i = 0; i < 50; i++) {
      const confetti = document.createElement("div");
      confetti.className = "confetti";
      confetti.style.left = Math.random() * 100 + "vw";
      confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 70%, 60%)`;
      confetti.style.animationDuration = 2 + Math.random() * 3 + "s";
      document.body.appendChild(confetti);
    }

    // Redirect after 10s & clear cache/localStorage
    setTimeout(() => {
      localStorage.clear();
      sessionStorage.clear();
      window.location.href = "index.html";
    }, 10000);
  </script>
</body>
</html>
